{{define "search"}}
<div class="w-full max-w-2xl" x-data="{
    query: '',
    engine: 0,
    engines: [
        {{range .Engines}}{name: '{{.Name}}', url: '{{.URL}}'},
        {{end}}
    ]
}">
    <form
        class="relative"
        @submit.prevent="window.open(engines[engine].url + encodeURIComponent(query), '_blank')"
    >
        <div class="flex items-center bg-slate-800 rounded-xl border border-slate-700 focus-within:border-accent focus-within:ring-2 focus-within:ring-accent/20 transition-all">
            <!-- Search Engine Selector -->
            <button
                type="button"
                @click="engine = (engine + 1) % engines.length"
                class="px-4 py-3 text-slate-400 hover:text-white transition-colors"
                :title="'Search with ' + engines[engine].name"
            >
                <span x-text="engines[engine].name" class="text-sm font-medium"></span>
            </button>

            <!-- Search Input -->
            <input
                type="text"
                x-model="query"
                placeholder="{{default "Search..." .Placeholder}}"
                class="flex-1 bg-transparent px-4 py-3 text-lg outline-none placeholder-slate-500"
                autofocus
            >

            <!-- Search Button -->
            <button
                type="submit"
                class="px-6 py-3 text-slate-400 hover:text-white transition-colors"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </button>
        </div>
    </form>
</div>
{{end}}
