{{define "stats"}}
<div class="flex flex-col gap-2 text-sm text-slate-400">
    <!-- CPU -->
    <div class="flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
        </svg>
        <div class="w-16 h-1.5 bg-slate-700 rounded-full overflow-hidden">
            <div class="h-full bg-slate-400 rounded-full" style="width: {{printf "%.0f" .CPU.UsagePercent}}%"></div>
        </div>
        <span>{{printf "%.0f" .CPU.UsagePercent}}%</span>
    </div>

    <!-- Memory -->
    <div class="flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        <div class="w-16 h-1.5 bg-slate-700 rounded-full overflow-hidden">
            <div class="h-full bg-slate-400 rounded-full" style="width: {{printf "%.0f" .Memory.UsedPercent}}%"></div>
        </div>
        <span>{{formatBytes .Memory.Used}}<span class="text-slate-600">/{{formatBytes .Memory.Total}}</span></span>
    </div>

    <!-- Primary Disk (first one only) -->
    {{with index .Disks 0}}
    <div class="flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
        </svg>
        <div class="w-16 h-1.5 bg-slate-700 rounded-full overflow-hidden">
            <div class="h-full bg-slate-400 rounded-full" style="width: {{printf "%.0f" .UsedPercent}}%"></div>
        </div>
        <span>{{formatBytes .Free}}<span class="text-slate-600"> free</span></span>
    </div>
    {{end}}
</div>
{{end}}
