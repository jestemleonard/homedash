# Radarr Integration
# Movie management and automation
# https://radarr.video

id: radarr
name: Radarr
icon: radarr
color: "#ffc230"

detection:
  images:
    - linuxserver/radarr
    - hotio/radarr
    - "*radarr*"
  default_port: 7878

  config_discovery:
    config_path: /config/config.xml
    format: xml
    key: ApiKey

auth:
  type: api_key
  api_key:
    location: header
    name: X-Api-Key

api:
  base_path: /api/v3

  endpoints:
    health:
      path: /health
      method: GET
      interval: 60s
      mapping:
        status: $[0].type

    movie:
      path: /movie
      method: GET
      interval: 300s
      mapping:
        total:
          expr: "length($)"
        monitored:
          expr: "length($[?@.monitored == true])"
        downloaded:
          expr: "length($[?@.hasFile == true])"

widgets:
  - id: library
    name: Library
    endpoint: movie

    fields:
      total: {label: "Movies", display: number}
      monitored: {label: "Monitored", display: number}
      downloaded: {label: "Downloaded", display: number}
